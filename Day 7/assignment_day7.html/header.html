<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Bootstrap Layout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.header{
    background:#4e73c2;
    height:150px;
    border-radius:25px;
    font-size:70px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:20px;
}

.column{
    height:400px;
    border-radius:40px;
    font-size:55px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
}

.col1{
    background:#74b346;
}

.col2{
    background:#f47c29;
}

.col3{
    background:#ffc107;
}

.footer{
    background:#5b95cf;
    height:70px;
    border-radius:10px;
    font-size:45px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
}

</style>

</head>

<body>

<div class="container-fluid">

    <!-- Header -->
    <div class="row mt-3">
        <div class="col-12">
            <div class="header">
                Header
            </div>
        </div>
    </div>

    <!-- Columns -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="column col1">
                Column 1
            </div>
        </div>

        <div class="col-md-4">
            <div class="column col2">
                Column 2
            </div>
        </div>

        <div class="col-md-4">
            <div class="column col3">
                Column 3
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row mt-4 mb-3">
        <div class="col-12">
            <div class="footer">
                Footer
            </div>
        </div>
    </div>

</div>

</body>
</html>
